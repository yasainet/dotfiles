gui:
  sidePanelWidth: 0.2
  scrollPastBottom: false
  showCommandLog: false
  showRandomTip: false
  nerdFontsVersion: "3"
  theme:
    activeBorderColor:
      - "#ff9e64"
      - "bold"
    inactiveBorderColor:
      - "#27a1b9"
    searchingActiveBorderColor:
      - "#ff9e64"
      - "bold"
    optionsTextColor:
      - "#7aa2f7"
    selectedLineBgColor:
      - "#283457"
    cherryPickedCommitFgColor:
      - "#7aa2f7"
    cherryPickedCommitBgColor:
      - "#bb9af7"
    markedBaseCommitFgColor:
      - "#7aa2f7"
    markedBaseCommitBgColor:
      - "#e0af68"
    unstagedChangesColor:
      - "#db4b4b"
    defaultFgColor:
      - "#c0caf5"
git:
  pagers:
    - name: hunk
      colorArg: always
      pager: hunk pager --mode split
os:
  editPreset: "nvim"
keybinding:
  files:
    commitChanges: "<disabled>"
customCommands:
  - key: "c"
    context: "files"
    description: "AI commit (stage all + generate message)"
    command: sh -c "~/.config/lazygit/ai-commit-msg.sh"
    output: terminal
