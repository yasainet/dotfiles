# Homebrew PATH
set-environment -g PATH "/opt/homebrew/bin:/opt/homebrew/sbin:/usr/bin:/bin:/usr/sbin:/sbin"

# Prefix
unbind C-b
set -g prefix M-b
bind M-b send-prefix

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-features 'xterm*:RGB'

# Extended keys support
set -g extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Cursor style
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'

# Hyperlinks support
set -as terminal-features 'xterm*:hyperlinks'

# Scrollback history
set -g history-limit 50000

# Mouse support
set -g mouse on

# Clipboard
set -g set-clipboard on

# Focus events
set -g focus-events on

# Session destroy: switch to previously active session instead of detaching
set -g detach-on-destroy previous

# is_vim: detect if the current pane is running vim/nvim/fzf
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

# is_claude: detect if the current pane is running Claude Code
is_claude="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?claude$'"

# Yank
set-window-option -g mode-keys vi
bind v   if-shell "$is_vim" "send-keys 'C-\\' 'C-n'" "copy-mode" \; run-shell -b "/opt/homebrew/bin/macism com.apple.keylayout.ABC"
bind C-v if-shell "$is_vim" "send-keys 'C-\\' 'C-n'" "copy-mode" \; run-shell -b "/opt/homebrew/bin/macism com.apple.keylayout.ABC"
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Allow passthrough for image.nvim
set -g allow-passthrough all

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Window creation
bind c new-window -a -c "#{pane_current_path}"

# Window close (with confirmation to prevent accidental Cmd+W)
bind & confirm-before -p "kill-window #W? (y/n)" kill-window

# Pane split
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind x kill-pane

# Prevent accidental layout reset
unbind Space
unbind M-1
unbind M-2
unbind M-3
unbind M-4
unbind M-5

# Pane navigation
bind-key -n M-h if-shell "$is_vim" "send-keys M-h" "select-pane -L"
bind-key -n M-j if-shell "$is_vim" "send-keys M-j" "select-pane -D"
bind-key -n M-k if-shell "$is_vim" "send-keys M-k" "select-pane -U"
bind-key -n M-l if-shell "$is_vim" "send-keys M-l" "select-pane -R"

# Clear
bind K send-keys C-l \; clear-history

# Zoom toggle
bind -n C-\\ resize-pane -Z

# Last window (like `cd -`)
bind - last-window

# Session/window switcher (tmux-sessionx)
bind-key -n C-q run-shell '~/.config/tmux/plugins/tmux-sessionx/scripts/sessionx.sh'

# Claude Code: chat history popup (M-r, claude pane only)
bind-key -n M-r if-shell "$is_claude" \
  "display-popup -E -h 90% -w 90% -d '#{pane_current_path}' '~/.config/tmux/scripts/chathist-popup.sh'" \
  "send-keys M-r"

# File picker popup (M-f, claude pane only)
bind-key -n M-f if-shell "$is_claude" \
  "display-popup -E -h 90% -w 90% -d '#{pane_current_path}' '~/.config/tmux/scripts/tmux-file-picker.sh'" \
  "send-keys M-f"

# Terminal popup (M-/, claude pane only) — symmetry with nvim snacks terminal (C-/)
bind-key -n M-/ if-shell "$is_claude" \
  "display-popup -E -h 90% -w 90% -d '#{pane_current_path}' -e TMUX_POPUP=1 zsh" \
  "send-keys M-/"

# Theme
source-file ~/.config/tmux/themes/tokyonight_night.tmux

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-sessionx'

# tmux-sessionx
set -g @sessionx-prefix 'on'
set -g @sessionx-preview-location 'right'
set -g @sessionx-preview-ratio '60%'
set -g @sessionx-window-height '90%'
set -g @sessionx-window-width '90%'
set -g @sessionx-tree-mode 'on'
set -g @sessionx-git-branch 'on'
set -g @sessionx-filter-current 'false'

# Claude Code state (window-level, focus-acknowledged via window-status-style)
set-hook -g pane-focus-in 'set-option -wu window-status-style'
set-hook -ag pane-focus-in 'set-option -wu window-status-current-style'

# tmux-resurrect
set -g @resurrect-dir '$HOME/.config/tmux/resurrect'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'

# tmux-continuum
set -g @continuum-restore 'on'

# TPM
run '~/.config/tmux/plugins/tpm/tpm'
