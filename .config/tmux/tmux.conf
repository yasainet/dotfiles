# Homebrew PATH
set-environment -g PATH "/opt/homebrew/bin:/opt/homebrew/sbin:/usr/bin:/bin:/usr/sbin:/sbin"

# Prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Extended keys support
set -g extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Cursor style
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'

# Hyperlinks support
set -as terminal-features 'xterm*:hyperlinks'

# Scrollback history
set -g history-limit 50000

# Mouse support
set -g mouse on

# Clipboard
set -g set-clipboard on

# Focus events
set -g focus-events on

# Yank
set-window-option -g mode-keys vi
bind v copy-mode
bind C-v copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Allow passthrough for image.nvim
set -g allow-passthrough all

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Window creation
bind c new-window -a -c "#{pane_current_path}"

# Window close (no confirmation)
bind & kill-window

# Pane split
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind x kill-pane

# Pane navigation
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
# Search: nvim -> /, otherwise -> copy-mode /
bind-key -n M-f if-shell "$is_vim" "send-keys /" "copy-mode \; send-keys /"

bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind K send-keys C-l \; clear-history

# Last window (like `cd -`)
bind - last-window

# Session/window tree
bind-key -n C-q choose-tree -swZ -O name -F '#{?window_format,#{window_index}: #{window_name}#{window_flags} (#{window_panes} panes) [#{window_width}x#{window_height}],#{session_windows} windows#{?session_attached, (attached),}}'
bind q switch-client -n
bind Q switch-client -p

# Popup style
set -g popup-border-lines rounded

# Lazygit
bind g display-popup -E -w 100% -h 100% "lazygit"

# Theme
source-file ~/.config/tmux/themes/tokyonight_night.tmux

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# tmux-agent-indicator
set -g @plugin 'accessd/tmux-agent-indicator'
set -g @agent-indicator-background-enabled 'off'
set -g @agent-indicator-border-enabled 'off'
set -g @agent-indicator-indicator-enabled 'off'
set -g @agent-indicator-reset-on-focus 'on'
set -g @agent-indicator-notification-enabled 'off'

# tmux-resurrect
set -g @resurrect-dir '$HOME/.config/tmux/resurrect'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'

# tmux-continuum
set -g @continuum-restore 'on'

# TPM
run '~/.config/tmux/plugins/tpm/tpm'
