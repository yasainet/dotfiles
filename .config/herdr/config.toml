[theme]
name = "tokyo-night"

[theme.custom]
surface_dim = "#3b4261"

[terminal]
shell_mode = "auto"
new_cwd = "follow"

[keys]
prefix = "ctrl+b"
navigate_workspace_up = "k"
navigate_workspace_down = "j"

[ui]
accent = "cyan"
agent_panel_sort = "spaces"
pane_borders = true
pane_gaps = true
show_agent_labels_on_pane_borders = false
prompt_new_tab_name = false

[ui.toast]
delivery = "terminal"

[ui.sound]
enabled = true

[session]
resume_agents_on_restore = true

[experimental]
switch_ascii_input_source_in_prefix = false
reveal_hidden_cursor_for_cjk_ime = true
cjk_ime_agents = ["claude", "codex"]
cjk_ime_cursor_shape = "steady_block"

[[keys.command]]
key = "prefix+r"
type = "pane"
command = "/Users/yasainet/.config/herdr/scripts/chathist-popup.sh"

[[keys.command]]
key = "prefix+f"
type = "pane"
command = "/Users/yasainet/.config/herdr/scripts/file-picker.sh"

# vim-tmux-navigator 相当: nvim ペインなら --remote-send で <C-hjkl> 再注入、
# それ以外は herdr pane focus。nvim 側は marker file を書き出す。
[[keys.command]]
key = "ctrl+h"
type = "shell"
command = "/Users/yasainet/.config/herdr/scripts/nvim-nav.sh h"

[[keys.command]]
key = "ctrl+j"
type = "shell"
command = "/Users/yasainet/.config/herdr/scripts/nvim-nav.sh j"

[[keys.command]]
key = "ctrl+k"
type = "shell"
command = "/Users/yasainet/.config/herdr/scripts/nvim-nav.sh k"

[[keys.command]]
key = "ctrl+l"
type = "shell"
command = "/Users/yasainet/.config/herdr/scripts/nvim-nav.sh l"
