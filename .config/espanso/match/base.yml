# espanso matches (snippets)
# yaml-language-server: $schema=https://raw.githubusercontent.com/espanso/espanso/dev/schemas/match.schema.json

matches:
  - trigger: ";pj"
    replace: "~/Projects/"
  - trigger: ";js"
    replace: "JavaScript"
  - trigger: ";ts"
    replace: "TypeScript"
  - trigger: ";ne"
    replace: "Next.js"
  - trigger: ";no"
    replace: "Node.js"
  - trigger: ";su"
    replace: "Supabase"
  - trigger: ";ed"
    replace: "Edge Functions"
  - trigger: ";po"
    replace: "PostgreSQL"
  - trigger: ";cf"
    replace: "Cloudflare"
  - trigger: ";cc"
    replace: "Claude Code"
  - trigger: ";oc"
    replace: "OpenCode"
