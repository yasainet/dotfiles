# espanso matches (snippets)
# yaml-language-server: $schema=https://raw.githubusercontent.com/espanso/espanso/dev/schemas/match.schema.json

matches:
  - trigger: ";pj"
    replace: "~/Projects/"
  - trigger: ";js"
    replace: "JavaScript"
  - trigger: ";ts"
    replace: "TypeScript"
  - trigger: ";ne"
    replace: "Next.js"
  - trigger: ";node"
    replace: "Node.js"
  - trigger: ";su"
    replace: "Supabase"
  - trigger: ";ed"
    replace: "Edge Functions"
  - trigger: ";pg"
    replace: "PostgreSQL"
  - trigger: ";cf"
    replace: "Cloudflare"
  - trigger: ";cc"
    replace: "Claude Code"
  - trigger: ";oc"
    replace: "OpenCode"
  - trigger: ";dev"
    replace: "development"
  - trigger: ";prod"
    replace: "production"
  - trigger: ";date"
    replace: "{{d}}"
    vars:
      - name: d
        type: date
        params:
          format: "%Y/%m/%d"
  - trigger: ";time"
    replace: "{{d}}"
    vars:
      - name: d
        type: date
        params:
          format: "%H:%M:%S"
  - trigger: ";now"
    replace: "{{d}}"
    vars:
      - name: d
        type: date
        params:
          format: "%Y/%m/%d %H:%M"
